<!--
  口コミウィジェット（フロントエンドのみのダミー版・動作確認用）
  ------------------------------------------------------------
  Supabase接続なしで、投稿したらその場で下の一覧に追加されるだけの
  デモ版です。ページを再読み込みすると投稿内容は消えます（保存されません）。

  本番でSupabaseに保存・共有したい場合は review-widget-supabase.html を
  使ってください（SETUP.md参照）。
-->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>口コミウィジェット プレビュー（ダミー版）</title>
</head>
<body>
<section id="kuchikomi-widget">
  <style>
    #kuchikomi-widget {
      --kc-orange: #F4A35C;
      --kc-orange-deep: #E8854A;
      --kc-orange-deeper: #D9702F;
      --kc-orange-light: #FBE3C8;
      --kc-cream: #FFF9F2;
      --kc-text: #4A3526;
      --kc-text-mid: #7A6354;
      --kc-text-light: #A8927F;
      --kc-border: #F0DDC4;
      --kc-danger: #C9695A;
      --kc-success: #6FA888;
      max-width: 640px;
      margin: 0 auto;
      padding: 32px 20px;
      font-family: 'Noto Sans JP', sans-serif;
      color: var(--kc-text);
    }
    #kuchikomi-widget * { box-sizing: border-box; }
    #kuchikomi-widget h2 {
      font-size: 20px;
      margin: 0 0 18px;
      color: var(--kc-orange-deeper);
    }
    #kuchikomi-widget .kc-card {
      background: var(--kc-cream);
      border: 1px solid var(--kc-border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 28px;
    }
    #kuchikomi-widget .kc-field { margin-bottom: 16px; }
    #kuchikomi-widget .kc-field label {
      display: block;
      font-size: 13px;
      color: var(--kc-text-mid);
      margin-bottom: 6px;
    }
    #kuchikomi-widget .kc-field input,
    #kuchikomi-widget .kc-field textarea {
      width: 100%;
      padding: 11px 13px;
      border: 1.5px solid var(--kc-border);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      color: var(--kc-text);
    }
    #kuchikomi-widget .kc-field input:focus,
    #kuchikomi-widget .kc-field textarea:focus {
      outline: none;
      border-color: var(--kc-orange-deep);
    }
    #kuchikomi-widget .kc-field textarea { min-height: 100px; resize: vertical; }
    #kuchikomi-widget .kc-submit {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: 999px;
      font-size: 14px;
      border: none;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, var(--kc-orange), var(--kc-orange-deep));
    }
    #kuchikomi-widget .kc-submit:disabled { opacity: .5; cursor: not-allowed; }
    #kuchikomi-widget .kc-msg {
      display: none;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    #kuchikomi-widget .kc-msg.show { display: block; }
    #kuchikomi-widget .kc-msg.success { background: #EFF6F1; color: var(--kc-success); border: 1px solid #CFE6D9; }
    #kuchikomi-widget .kc-msg.error { background: #FBEDEA; color: var(--kc-danger); border: 1px solid #F1CFC8; }
    #kuchikomi-widget .kc-list { display: flex; flex-direction: column; gap: 14px; }
    #kuchikomi-widget .kc-review {
      background: #fff;
      border: 1px solid var(--kc-border);
      border-radius: 14px;
      padding: 18px 20px;
    }
    #kuchikomi-widget .kc-review .kc-date-badge {
      display: inline-block;
      background: var(--kc-orange-light);
      color: var(--kc-orange-deeper);
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 10px;
    }
    #kuchikomi-widget .kc-review .kc-comment {
      font-size: 14px;
      color: var(--kc-text-mid);
      white-space: pre-wrap;
      margin: 0;
    }
    #kuchikomi-widget .kc-empty {
      text-align: center;
      color: var(--kc-text-light);
      font-size: 13px;
      padding: 20px 0;
    }
  </style>

  <div class="kc-card">
    <h2>ご感想</h2>
    <div class="kc-msg" id="kcFormMsg"></div>
    <form id="kcReviewForm">
      <div class="kc-field">
        <label for="kcUsedMonth">利用した日付</label>
        <input type="month" id="kcUsedMonth" required>
      </div>
      <div class="kc-field">
        <label for="kcComment">利用した感想を教えてください</label>
        <textarea id="kcComment" maxlength="1000" required></textarea>
      </div>
      <button type="submit" class="kc-submit" id="kcSubmitBtn">投稿する</button>
    </form>
  </div>

  <h2>お客様の声</h2>
  <div class="kc-list" id="kcReviewList">
    <p class="kc-empty">まだ投稿がありません。最初のご感想を投稿してみませんか？</p>
  </div>
</section>

<script>
(function () {
  var reviews = []; // ダミーのその場限りのデータ（保存されません）

  function escapeHtml(str) {
    var div = document.createElement("div");
    div.textContent = str || "";
    return div.innerHTML;
  }
  function formatMonthLabel(value) {
    var parts = value.split("-");
    return parts[0] + "年" + Number(parts[1]) + "月";
  }
  function showMsg(type, text) {
    var el = document.getElementById("kcFormMsg");
    el.className = "kc-msg show " + type;
    el.textContent = text;
  }

  function renderList() {
    var listEl = document.getElementById("kcReviewList");
    if (reviews.length === 0) {
      listEl.innerHTML = '<p class="kc-empty">まだ投稿がありません。最初のご感想を投稿してみませんか？</p>';
      return;
    }
    listEl.innerHTML = reviews.map(function (r) {
      return (
        '<div class="kc-review">' +
        '<div class="kc-date-badge">' + escapeHtml(formatMonthLabel(r.usedMonth)) + 'にご利用</div>' +
        '<p class="kc-comment">' + escapeHtml(r.comment) + '</p>' +
        '</div>'
      );
    }).join("");
  }

  document.getElementById("kcReviewForm").addEventListener("submit", function (e) {
    e.preventDefault();
    var usedMonth = document.getElementById("kcUsedMonth").value;
    var comment = document.getElementById("kcComment").value.trim();

    if (!usedMonth || !comment) {
      showMsg("error", "すべての項目を入力してください。");
      return;
    }

    reviews.unshift({ usedMonth: usedMonth, comment: comment });
    renderList();

    showMsg("success", "ご感想を投稿しました（ダミー表示のため保存はされません）。");
    document.getElementById("kcReviewForm").reset();
  });
})();
</script>
</body>
</html>

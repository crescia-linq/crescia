<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crescia YouTube Playlists</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #fff8ee;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 80px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #ff6b00;
      text-align: center;
      margin-bottom: 12px;
      letter-spacing: 0.02em;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #666;
      text-align: center;
      margin-bottom: 48px;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 24px;
      width: 100%;
      max-width: 1100px;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      padding: 32px 28px;
      width: 320px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-decoration: none;
      color: inherit;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 36px rgba(255, 107, 0, 0.18);
    }

    .card-icon {
      width: 52px;
      height: 52px;
      background-color: #ff6b00;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      flex-shrink: 0;
    }

    .card-icon svg {
      width: 22px;
      height: 22px;
      fill: #ffffff;
      margin-left: 3px;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 24px;
      flex: 1;
    }

    .card-btn {
      display: inline-block;
      background-color: #ff6b00;
      color: #ffffff;
      font-size: 0.88rem;
      font-weight: 600;
      padding: 10px 22px;
      border-radius: 50px;
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: background-color 0.2s ease;
    }

    .card:hover .card-btn {
      background-color: #e05a00;
    }

    @media (max-width: 720px) {
      h1 {
        font-size: 1.5rem;
      }

      .cards {
        flex-direction: column;
        align-items: center;
      }

      .card {
        width: 100%;
        max-width: 400px;
      }
    }
  </style>
</head>
<body>

  <h1>Crescia YouTube Playlists</h1>
  <p class="subtitle">クレッシャメンバー限定コンテンツへ簡単にアクセスできます</p>

  <div class="cards">

    <div class="card">
      <div class="card-icon">
        <svg viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
      </div>
      <p class="card-title">【クレッシャメンバー限定】<br>コンテンツ</p>
      <a class="card-btn" href="https://www.youtube.com/playlist?list=PLVkaaxo8uPYhWyzl1YEVMkEMmvfyyD-9k" target="_blank" rel="noopener noreferrer">再生リストを見る</a>
    </div>

    <div class="card">
      <div class="card-icon">
        <svg viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
      </div>
      <p class="card-title">【クレッシャメンバー限定】<br>料理シェア会</p>
      <a class="card-btn" href="https://www.youtube.com/playlist?list=PLVkaaxo8uPYjNTf0KBiJSSn2XE5c5LK8I" target="_blank" rel="noopener noreferrer">再生リストを見る</a>
    </div>

    <div class="card">
      <div class="card-icon">
        <svg viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
      </div>
      <p class="card-title">【クレッシャメンバー限定】<br>操作方法</p>
      <a class="card-btn" href="https://www.youtube.com/playlist?list=PLVkaaxo8uPYjc-ty9T2gOnOaExg0zvwku" target="_blank" rel="noopener noreferrer">再生リストを見る</a>
    </div>

  </div>

</body>
</html>

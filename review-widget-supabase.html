<!--
  口コミウィジェット（貼り付け用パーツ）
  ------------------------------------------------------------
  このファイルは単体でも開けるよう <head> 付きの完全なHTMLにしています。

  既存サイトに貼り付ける場合：
    <!DOCTYPE html> 〜 <body> の行と、</body></html> の行は不要です。
    その間の <section id="kuchikomi-widget"> 〜 </script> の部分だけを
    既存のHTMLファイルの <body> 内、口コミを表示したい場所にコピー＆ペーストしてください
    （既存ページの <head> に <meta charset="UTF-8"> がすでにあれば文字化けしません）。

  使う前に必ず以下の2箇所を書き換えてください（このファイル内に印あり）。
    1. SUPABASE_URL
    2. SUPABASE_ANON_KEY

  Supabase側の準備（テーブル作成）は supabase-schema.sql を
  SupabaseのSQL Editorで実行してください。
  詳しい手順は SETUP.md を参照してください。
-->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>口コミウィジェット プレビュー</title>
</head>
<body>
<section id="kuchikomi-widget">
  <style>
    #kuchikomi-widget {
      --kc-orange: #F4A35C;
      --kc-orange-deep: #E8854A;
      --kc-orange-deeper: #D9702F;
      --kc-orange-light: #FBE3C8;
      --kc-cream: #FFF9F2;
      --kc-text: #4A3526;
      --kc-text-mid: #7A6354;
      --kc-text-light: #A8927F;
      --kc-border: #F0DDC4;
      --kc-star: #F2A93C;
      --kc-danger: #C9695A;
      --kc-success: #6FA888;
      max-width: 640px;
      margin: 0 auto;
      padding: 36px 20px;
      font-family: 'Noto Sans JP', sans-serif;
      color: var(--kc-text);
      background: linear-gradient(160deg, #FFFBF6 0%, #FFEFE0 55%, #FFF6EC 100%);
      border-radius: 28px;
    }
    #kuchikomi-widget * { box-sizing: border-box; }
    #kuchikomi-widget h2 {
      font-size: 21px;
      font-weight: 600;
      letter-spacing: .02em;
      margin: 0 0 18px;
      color: var(--kc-orange-deeper);
    }
    #kuchikomi-widget .kc-card {
      background: linear-gradient(160deg, #FFFDF9 0%, var(--kc-cream) 100%);
      border: 1px solid var(--kc-border);
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 32px;
      box-shadow: 0 18px 40px -14px rgba(217, 112, 47, 0.28), 0 4px 10px rgba(217, 112, 47, 0.08);
    }
    #kuchikomi-widget .kc-field { margin-bottom: 16px; }
    #kuchikomi-widget .kc-field label {
      display: block;
      font-size: 13px;
      color: var(--kc-text-mid);
      margin-bottom: 6px;
    }
    #kuchikomi-widget .kc-field input,
    #kuchikomi-widget .kc-field textarea {
      width: 100%;
      padding: 11px 13px;
      border: 1.5px solid var(--kc-border);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      color: var(--kc-text);
    }
    #kuchikomi-widget .kc-field input:focus,
    #kuchikomi-widget .kc-field textarea:focus {
      outline: none;
      border-color: var(--kc-orange-deep);
      box-shadow: 0 0 0 3px rgba(232, 133, 74, 0.15);
    }
    #kuchikomi-widget .kc-field textarea { min-height: 100px; resize: vertical; }
    #kuchikomi-widget .kc-star-input { display: flex; gap: 6px; font-size: 26px; }
    #kuchikomi-widget .kc-star-input button {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--kc-border);
      padding: 0;
      line-height: 1;
      transition: transform .15s ease;
    }
    #kuchikomi-widget .kc-star-input button.active { color: var(--kc-star); transform: scale(1.1); }
    #kuchikomi-widget .kc-submit {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 34px;
      border-radius: 999px;
      font-size: 14.5px;
      font-weight: 600;
      letter-spacing: .03em;
      border: none;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, var(--kc-orange) 0%, var(--kc-orange-deep) 55%, var(--kc-orange-deeper) 100%);
      box-shadow: 0 10px 24px -6px rgba(217, 112, 47, 0.55);
      transition: transform .25s ease, box-shadow .25s ease;
    }
    #kuchikomi-widget .kc-submit:hover:not(:disabled) {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 16px 30px -6px rgba(217, 112, 47, 0.6);
    }
    #kuchikomi-widget .kc-submit:active:not(:disabled) {
      transform: translateY(-1px) scale(1);
    }
    #kuchikomi-widget .kc-submit:disabled { opacity: .5; cursor: not-allowed; }
    #kuchikomi-widget .kc-msg {
      display: none;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    #kuchikomi-widget .kc-msg.show { display: block; }
    #kuchikomi-widget .kc-msg.success { background: #EFF6F1; color: var(--kc-success); border: 1px solid #CFE6D9; }
    #kuchikomi-widget .kc-msg.error { background: #FBEDEA; color: var(--kc-danger); border: 1px solid #F1CFC8; }
    #kuchikomi-widget .kc-list { display: flex; flex-direction: column; gap: 14px; }
    #kuchikomi-widget .kc-review {
      background: #fff;
      border: 1px solid var(--kc-border);
      border-radius: 16px;
      padding: 20px 22px;
      box-shadow: 0 8px 22px -10px rgba(217, 112, 47, 0.18);
      transition: transform .2s ease, box-shadow .2s ease;
    }
    #kuchikomi-widget .kc-review:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px -10px rgba(217, 112, 47, 0.26);
    }
    #kuchikomi-widget .kc-review .kc-stars { color: var(--kc-star); font-size: 15px; letter-spacing: 2px; }
    #kuchikomi-widget .kc-review .kc-comment {
      font-size: 14px;
      color: var(--kc-text-mid);
      white-space: pre-wrap;
      margin: 8px 0;
    }
    #kuchikomi-widget .kc-review .kc-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--kc-text-light);
    }
    #kuchikomi-widget .kc-empty {
      text-align: center;
      color: var(--kc-text-light);
      font-size: 13px;
      padding: 20px 0;
    }
  </style>

  <div class="kc-card">
    <h2>レビューを投稿する 💌</h2>
    <div class="kc-msg" id="kcFormMsg"></div>
    <form id="kcReviewForm">
      <div class="kc-field">
        <label for="kcNickname">ニックネーム</label>
        <input type="text" id="kcNickname" maxlength="30" required>
      </div>
      <div class="kc-field">
        <label>評価</label>
        <div class="kc-star-input" id="kcStarInput">
          <button type="button" data-value="1">★</button>
          <button type="button" data-value="2">★</button>
          <button type="button" data-value="3">★</button>
          <button type="button" data-value="4">★</button>
          <button type="button" data-value="5">★</button>
        </div>
        <input type="hidden" id="kcRating">
      </div>
      <div class="kc-field">
        <label for="kcComment">コメント</label>
        <textarea id="kcComment" maxlength="1000" required></textarea>
      </div>
      <button type="submit" class="kc-submit" id="kcSubmitBtn">投稿する</button>
    </form>
  </div>

  <h2>お客さまの声 ✨</h2>
  <div class="kc-list" id="kcReviewList">
    <p class="kc-empty">読み込み中です…</p>
  </div>
</section>

<script>
(function () {
  // ▼▼▼ 1. ここを書き換えてください ▼▼▼
  var SUPABASE_URL = "https://YOUR-PROJECT-REF.supabase.co";
  var SUPABASE_ANON_KEY = "YOUR-ANON-PUBLIC-KEY";
  // ▲▲▲ ここまで ▲▲▲

  function escapeHtml(str) {
    var div = document.createElement("div");
    div.textContent = str || "";
    return div.innerHTML;
  }
  function renderStars(rating) {
    var r = Math.max(1, Math.min(5, Math.round(rating)));
    return "★".repeat(r) + "☆".repeat(5 - r);
  }
  function formatDate(isoString) {
    var d = new Date(isoString);
    return d.getFullYear() + "年" + (d.getMonth() + 1) + "月" + d.getDate() + "日";
  }
  function showMsg(type, text) {
    var el = document.getElementById("kcFormMsg");
    el.className = "kc-msg show " + type;
    el.textContent = text;
  }

  function init(supabaseLib) {
    var supabase = supabaseLib.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function loadReviews() {
      var listEl = document.getElementById("kcReviewList");
      supabase
        .from("reviews")
        .select("nickname, rating, comment, created_at")
        .order("created_at", { ascending: false })
        .then(function (res) {
          if (res.error) throw res.error;
          var data = res.data || [];
          if (data.length === 0) {
            listEl.innerHTML = '<p class="kc-empty">まだ口コミがありません。最初の口コミを投稿してみませんか？</p>';
            return;
          }
          listEl.innerHTML = data.map(function (r) {
            return (
              '<div class="kc-review">' +
              '<div class="kc-stars">' + renderStars(r.rating) + '</div>' +
              '<p class="kc-comment">' + escapeHtml(r.comment) + '</p>' +
              '<div class="kc-meta">' +
              '<span>' + escapeHtml(r.nickname) + '様</span>' +
              '<span>' + formatDate(r.created_at) + '</span>' +
              '</div></div>'
            );
          }).join("");
        })
        .catch(function () {
          listEl.innerHTML = '<p class="kc-empty">口コミの読み込みに失敗しました。</p>';
        });
    }

    var starInput = document.getElementById("kcStarInput");
    var ratingField = document.getElementById("kcRating");
    starInput.querySelectorAll("button").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var value = Number(btn.dataset.value);
        ratingField.value = value;
        starInput.querySelectorAll("button").forEach(function (b) {
          b.classList.toggle("active", Number(b.dataset.value) <= value);
        });
      });
    });

    document.getElementById("kcReviewForm").addEventListener("submit", function (e) {
      e.preventDefault();
      var submitBtn = document.getElementById("kcSubmitBtn");
      var nickname = document.getElementById("kcNickname").value.trim();
      var rating = Number(ratingField.value);
      var comment = document.getElementById("kcComment").value.trim();

      if (!nickname || !rating || !comment) {
        showMsg("error", "すべての項目を入力してください。");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "送信中…";

      supabase
        .from("reviews")
        .insert({ nickname: nickname, rating: rating, comment: comment })
        .then(function (res) {
          if (res.error) throw res.error;
          showMsg("success", "口コミを投稿しました。ありがとうございます。");
          document.getElementById("kcReviewForm").reset();
          starInput.querySelectorAll("button").forEach(function (b) { b.classList.remove("active"); });
          loadReviews();
        })
        .catch(function () {
          showMsg("error", "投稿に失敗しました。時間をおいて再度お試しください。");
        })
        .finally(function () {
          submitBtn.disabled = false;
          submitBtn.textContent = "投稿する";
        });
    });

    loadReviews();
  }

  if (window.supabase) {
    init(window.supabase);
  } else {
    var script = document.createElement("script");
    script.src = "https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js";
    script.onload = function () { init(window.supabase); };
    document.head.appendChild(script);
  }
})();
</script>
</body>
</html>

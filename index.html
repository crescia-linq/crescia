<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クレッシャ 再生リスト</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background-color: #faf8f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===== HEADER ===== */
    header {
      width: 100%;
      background-color: #fff;
      border-bottom: 3px solid #ff6b00;
      padding: 28px 24px 22px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    }

    .logo-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 6px;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background-color: #ff6b00;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg {
      width: 24px;
      height: 24px;
      fill: #fff;
    }

    header h1 {
      font-size: 1.7rem;
      font-weight: 700;
      color: #222;
      letter-spacing: 0.02em;
    }

    header p.subtitle {
      font-size: 0.92rem;
      color: #999;
      letter-spacing: 0.06em;
    }

    /* ===== MAIN ===== */
    main {
      width: 100%;
      max-width: 1100px;
      padding: 52px 24px 72px;
    }

    .section-label {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #ff6b00;
      margin-bottom: 10px;
    }

    .section-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #222;
      margin-bottom: 40px;
    }

    /* ===== CARD GRID ===== */
    .card-grid {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
    }

    /* ===== CARD ===== */
    .card {
      flex: 1 1 280px;
      background-color: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.07);
      transition: transform 0.28s ease, box-shadow 0.28s ease;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 16px 40px rgba(255, 107, 0, 0.18);
    }

    /* サムネイル */
    .card-thumbnail {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: linear-gradient(135deg, #ff6b00 0%, #ff9a44 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .card-thumbnail::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.15) 0%, transparent 60%);
    }

    .play-icon {
      width: 56px;
      height: 56px;
      background-color: rgba(255, 255, 255, 0.92);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
      transition: transform 0.2s ease;
      z-index: 1;
    }

    .card:hover .play-icon {
      transform: scale(1.12);
    }

    .play-icon svg {
      width: 24px;
      height: 24px;
      fill: #ff6b00;
      margin-left: 3px;
    }

    .card-number {
      position: absolute;
      top: 12px;
      left: 14px;
      background-color: rgba(0, 0, 0, 0.32);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 3px 9px;
      border-radius: 20px;
    }

    /* カード本文 */
    .card-body {
      padding: 22px 22px 26px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-tag {
      display: inline-block;
      background-color: #fff3eb;
      color: #ff6b00;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 12px;
      border: 1px solid #ffd4b2;
      align-self: flex-start;
    }

    .card-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .card-desc {
      font-size: 0.875rem;
      color: #888;
      line-height: 1.7;
      flex: 1;
      margin-bottom: 20px;
    }

    .card-cta {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      font-weight: 700;
      color: #ff6b00;
      letter-spacing: 0.02em;
      transition: gap 0.2s ease;
    }

    .card:hover .card-cta {
      gap: 10px;
    }

    .card-cta svg {
      width: 16px;
      height: 16px;
      fill: #ff6b00;
      flex-shrink: 0;
    }

    /* ===== FOOTER ===== */
    footer {
      width: 100%;
      margin-top: auto;
      text-align: center;
      padding: 22px 24px;
      font-size: 0.82rem;
      color: #bbb;
      border-top: 1px solid #ece9e4;
      background-color: #faf8f5;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      header h1 {
        font-size: 1.35rem;
      }

      main {
        padding: 36px 16px 56px;
      }

      .section-title {
        font-size: 1.25rem;
        margin-bottom: 28px;
      }

      .card-grid {
        flex-direction: column;
        gap: 20px;
      }
    }
  </style>
</head>
<body>
